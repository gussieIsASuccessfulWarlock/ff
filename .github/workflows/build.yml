name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: ff-linux-x86_64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: ff-linux-x86_64-musl
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: ff-linux-aarch64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: ff-linux-aarch64-musl
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            name: ff-linux-armv7

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target != 'x86_64-unknown-linux-gnu'
        run: |
          cargo install cross --git https://github.com/cross-rs/cross

      - name: Install musl tools (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build (native)
        if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'x86_64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.target != 'x86_64-unknown-linux-gnu' && matrix.target != 'x86_64-unknown-linux-musl'
        run: cross build --release --target ${{ matrix.target }}

      - name: Strip binary
        if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'x86_64-unknown-linux-musl'
        run: strip target/${{ matrix.target }}/release/ff

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/ff ${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  # Run tests on native target
  test:
    runs-on: ubuntu-latest
    name: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Run find test
        run: |
          ./target/release/ff Cargo.toml . | head -5

      - name: Run regex test
        run: |
          ./target/release/ff -e '\.rs$' src/ | head -15

      - name: Run hash test
        run: |
          ./target/release/ff hash src/

      - name: Run diff test
        run: |
          ./target/release/ff diff src/

      - name: Run JSON test
        run: |
          ./target/release/ff --json Cargo.toml . | python3 -m json.tool --no-ensure-ascii > /dev/null

  # Create release when a tag is pushed
  release:
    needs: [build, test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Make binaries executable
        run: chmod +x artifacts/*/ff-*

      - name: Create checksums
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            sha256sum "$name/$name" | sed "s|$name/||" >> checksums.txt
          done
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/ff-linux-x86_64/ff-linux-x86_64
            artifacts/ff-linux-x86_64-musl/ff-linux-x86_64-musl
            artifacts/ff-linux-aarch64/ff-linux-aarch64
            artifacts/ff-linux-aarch64-musl/ff-linux-aarch64-musl
            artifacts/ff-linux-armv7/ff-linux-armv7
            artifacts/checksums.txt
          generate_release_notes: true
